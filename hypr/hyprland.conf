source = ~/.config/hypr/hyprland.display.conf
source = ~/.config/hypr/hyprland.keybinds.conf
source = ~/.config/hypr/hyprland.keywords.conf

# ╔═══════════════════════════════════════════════════════╗
# ║ KEYWORDS CONFIGURATION                                ║
# ║ Wiki: https://wiki.hyprland.org/Configuring/Keywords/ ║
# ╚═══════════════════════════════════════════════════════╝

# Set main modifier key.
$mainMod = SUPER
# Default terminal emulator
$terminal = ghostty
# Default file manager
$fileManager = $terminal -e lf
# Default application launcher
$menu = rofi -show drun -lines 5

# ╔════════════════════════════════════════════════════════╗
# ║ AUTOSTART CONFIGURATION                                ║
# ║ Wiki: https://wiki.hyprland.org/Configuring/Autostart/ ║
# ╚════════════════════════════════════════════════════════╝

exec-once = systemctl --user start hyprpolkitagent
exec-once = nm-applet &
exec-once = waybar & hyprpaper

# ╔════════════════════════════════════════════════════════════════════╗
# ║ ENVIRONMENT VARIABLES CONFIGURATION                                ║
# ║ Wiki: https://wiki.hyprland.org/Configuring/Environment-variables/ ║
# ╚════════════════════════════════════════════════════════════════════╝

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ╔════════════════════════════════════════════════════════╗
# ║ VARIABLES CONFIGURATION                                ║
# ║ Wiki: https://wiki.hyprland.org/Configuring/Variables/ ║
# ╚════════════════════════════════════════════════════════╝

# GENERAL VARIABLES:
# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(b4befeee) 45deg
    col.inactive_border = rgba(45475aaa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

# DECORATION VARIABLES:
# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 0.9
    inactive_opacity = 0.8
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgb(203, 166, 247)
    }
    blur {
        enabled = true
        size = 8
        passes = 1
        vibrancy = 0.1696
    }
}

# ANIMATION VARIABLES:
# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# INPUT VARIABLES:
# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = latam
    kb_variant = 
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        scroll_factor = 0.8
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# ╔══════════════════════════════════════════════════════════╗
# ║ LAYOUTS CONFIGURATION                                    ║
# ║ Wiki: https://wiki.hypr.land/Configuring/Dwindle-Layout/ ║
# ║ Wiki: https://wiki.hypr.land/Configuring/Master-Layout/  ║
# ╚══════════════════════════════════════════════════════════╝

dwindle {
    pseudotile = false
    preserve_split = true
}
master {
    new_status = master
}

# ╔════════════════════════════════════════════════════════╗
# ║ WINDOW RULES CONFIGURATION                             ║
# ║ Wiki: https://wiki.hypr.land/Configuring/Window-Rules/ ║
# ╚════════════════════════════════════════════════════════╝

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}